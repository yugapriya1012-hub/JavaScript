    <script>
        const url =
            'https://restcountries.com/v3.1/all?fields=name,capital,population,languages,region,area,continents,unMember';

        fetch(url)
            .then((response) => response.json())
            .then((result) => {
                console.log(result);

                // Display all the capitals of the countries
                console.log(result.map((country)=>{
                    let myCapital=country.capital;
                    return myCapital
                }))
                // filter the names
                var countryNames = result.map((country) => country.name);
                console.log(countryNames);
                // Display all countries that are not UN members.
                console.log(result.filter((el)=>{
                    return el.unMember==false
                }));
                // Display the countries that are in Asia
                console.log(result.filter((country)=>{
                    return country.region=="Asia";
                }))

                console.log(result.filter((eachCountry)=>{
                    return eachCountry.population>10000000*10;
                }))
