<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            border:1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <form >
        <div class="total">
        <h2>Student Details</h2>
        <label for="name">Student name: </label>
        <input type="text" id="name" placeholder="Enter your name">
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email">
        <br><br>

        <label for="">College</label>
        <input type="text" id="college" placeholder="">
        <div>
        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <br><br>
        </div>
        <div>
        <label for="meal">Meal: </label>
        <input type="checkbox" id="veg" name="meal" value="veg">
        <label for="veg">Veg</label>
        <input type="checkbox" id="non-veg" name="meal" value="non-veg">
        <label for="non-veg">Non-veg</label>
        <input type="checkbox" id="both" name="meal" value="both">
        <label for="both">Both</label>
        <br><br>
        </div>

        <div>
        <label for="meal">Choice-of-meal: </label>
        <input type="checkbox" id="BreakFast" name="choicemeal" value="break">
        <label for="veg">BreakFast</label>
        <input type="checkbox" id="lunch" name="choicemeal" value="lunch">
        <label for="non-veg">Lunch</label>
        <input type="checkbox" id="dinner" name="choicemeal" value="dinner">
        <label for="both">Dinner</label>
        <br><br>
        </div>

    </div>

    </form>
</body>
</html>
