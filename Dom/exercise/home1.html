<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
</head>
<body>

<h1>Welcome to Home Page </h1>
<button onclick="logout()">Logout</button>

<script>
    // Check login
    if(localStorage.getItem("isLoggedIn") !== "true"){
        window.location.href = "login.html";
    }

    function logout(){
        localStorage.removeItem("isLoggedIn");
        window.location.href = "login1.html";
    }
</script>

</body>
</html>
